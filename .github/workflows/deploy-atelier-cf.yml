name: Deploy Atelier to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/atelier-desktop/**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/atelier-desktop/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/atelier-desktop

      - name: Build
        run: npm run build
        working-directory: apps/atelier-desktop

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 54d3e7319956514bd85bd3d1e25a8d76
          projectName: atelier-cgo
          directory: apps/atelier-desktop/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

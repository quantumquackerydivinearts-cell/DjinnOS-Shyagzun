name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/quantum-quackery/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 54d3e7319956514bd85bd3d1e25a8d76
          projectName: quantum-quackery
          directory: apps/quantum-quackery
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

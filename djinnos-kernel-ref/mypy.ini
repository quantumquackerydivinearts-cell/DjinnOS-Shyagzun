[mypy]
python_version = 3.11

# Core strictness
strict = True

# Discipline flags
warn_unused_ignores = True
warn_redundant_casts = True
warn_unreachable = True
check_untyped_defs = True

disallow_any_generics = True
disallow_subclassing_any = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
no_implicit_optional = True

# This is important: we allow Any only where *explicitly chosen*
disallow_any_explicit = False

# JSON, HTTP, and runner-only libs
[mypy-jsonpath_ng.*]
ignore_missing_imports = True

[mypy-requests.*]
ignore_missing_imports = True

# Allow Any in the conformance runner where intentional
[mypy-shygazun.conformance.runners.python.*]
disallow_any_explicit = False

# Kernel must be fully typed
[mypy-shygazun.kernel.*]
disallow_any_explicit = True

# Tests: require annotations, but allow loose bodies
[mypy-shygazun.tests.*]
disallow_any_explicit = False

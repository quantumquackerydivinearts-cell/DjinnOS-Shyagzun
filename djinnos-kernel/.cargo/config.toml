[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = ["-C", "link-arg=-Tlinker.ld"]
runner    = "qemu-system-riscv64 -machine virt -serial stdio -device virtio-gpu-device,bus=virtio-mmio-bus.1,xres=1280,yres=800 -device virtio-keyboard-device,bus=virtio-mmio-bus.2 -bios none -kernel"
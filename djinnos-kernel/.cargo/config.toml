[build]
target = "riscv64gc-unknown-none-elf"

[target.riscv64gc-unknown-none-elf]
rustflags = ["-C", "link-arg=-Tlinker.ld"]
runner    = "qemu-system-riscv64 -machine virt -serial stdio -device virtio-gpu-device,bus=virtio-mmio-bus.1,xres=1280,yres=800 -device virtio-keyboard-device,bus=virtio-mmio-bus.3 -drive file=disk.img,if=none,format=raw,id=hd0 -device virtio-blk-device,bus=virtio-mmio-bus.4,drive=hd0 -netdev user,id=net0,hostfwd=tcp::8080-:80 -device virtio-net-device,bus=virtio-mmio-bus.5,netdev=net0 -object filter-dump,id=netdump,netdev=net0,file=net.pcap -bios none -kernel"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tlinker_x86.ld",
    "-C", "relocation-model=static",
    "-C", "link-arg=-no-pie",
]
# Use build_x86.ps1 for running — the ELF must be converted to a flat binary first.

[env]
# C toolchain for kernel C modules and QuickJS.
# Requires LLVM (winget install LLVM.LLVM) to be installed.
CC = { value = "C:\\Program Files\\LLVM\\bin\\clang.exe", force = false }
AR = { value = "C:\\Program Files\\LLVM\\bin\\llvm-ar.exe", force = false }
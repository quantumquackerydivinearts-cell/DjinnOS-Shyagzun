    :root {
      --font-sans:                 "Inter", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      --color-text-primary:        #e4e4f0;
      --color-text-secondary:      #7878a0;
      --color-text-danger:         #d44848;
      --color-background-primary:  #16161f;
      --color-background-secondary:#1c1c28;
      --color-border-tertiary:     #2a2a3a;
      --border-radius-lg:          10px;
      --border-radius-md:           6px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #0e0e16;
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
    }

    .page-nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(14, 14, 22, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 0.5px solid var(--color-border-tertiary);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }
    .page-nav a {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.15s;
    }
    .page-nav a:hover { color: var(--color-text-primary); }
    .page-nav .page-title {
      color: var(--color-text-primary);
      font-size: 14px;
      font-weight: 500;
    }

    .page-wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    select, input[type=text], textarea {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 7px 10px;
      font-family: var(--font-sans);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, textarea:focus { border-color: #4a4a7a; }

    button {
      background: var(--color-background-secondary);
      color: var(--color-text-primary);
      border: 0.5px solid var(--color-border-tertiary);
      border-radius: var(--border-radius-md);
      padding: 7px 14px;
      font-family: var(--font-sans);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    button:hover {
      background: #242438;
      border-color: #4a4a7a;
    }

    input[type=range] {
      accent-color: #AFA9EC;
    }
  </style>
</head>

const corpus = [];

// ── Full candidate table ──────────────────────────────────────────────────────
// Loaded from the API on startup; falls back to the local BYTE_TABLE subset.

let _fullCandidates = null;  // { addr → {sym, tongue, meaning} } once loaded

async function loadFullCandidates() {

    const resp = await fetch('/api/v1/intel/candidates');
    if (!resp.ok) return;

// ── TCE prompt generation ─────────────────────────────────────────────────────

const ALL_TONGUES = [
  'Lotus','Rose','Sakura','Daisy','AppleBlossom','Aster','Grapevine','Cannabis',
  'Dragon','Virus','Bacteria','Excavata','Archaeplastida','Myxozoa','Archaea','Protist',
  'Immune','Neural','Serpent','Beast','Cherub','Chimera','Faerie','Djinn',
  'Fold','Topology','Phase','Gradient','Curvature','Prion','Blood','Moon',
  'Koi','Rope','Hook','Fang','Circle','Ledger'
];

const REGISTER_TONGUES = {
  psychospiritual:  ['Dragon','Immune','Neural','Cherub'],
  alchemical:       ['AppleBlossom','Prion','Blood'],
  political:        ['Ledger','Grapevine','Circle'],
  computational:    ['Fold','Topology','Phase'],
  ecological:       ['Lotus','Cannabis','Bacteria','Archaeplastida'],
  mythological:     ['Serpent','Beast','Chimera','Faerie'],
  phenomenological: ['Cannabis','Gradient','Curvature'],
  any:              [],
};

function buildTongueList(tongue, depth, register) {
  const reg = REGISTER_TONGUES[register] || [];
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];

  if (depth === 0) {
    if (tongue === 'any') return [pick(reg.length ? reg : ALL_TONGUES)];
    return [tongue];
  }
  if (depth === 1) {
    const base = tongue === 'any' ? pick(ALL_TONGUES) : tongue;
    const pool = reg.filter(t => t !== base);
    const partner = pool.length
      ? pick(pool)
      : ALL_TONGUES[(ALL_TONGUES.indexOf(base) + 1) % ALL_TONGUES.length];
    return [base, partner];
  }
  // depth 2: selected + register tongues + random fill
  const base = tongue === 'any' ? [] : [tongue];
  const fill = [...ALL_TONGUES].sort(() => Math.random() - 0.5).slice(0, 2);
  return [...new Set([...base, ...reg.slice(0, 3), ...fill])];
}

function activationBar(v) {
  const n = Math.round(Math.max(0, Math.min(1, v)) * 8);
  return '█'.repeat(n) + '░'.repeat(8 - n);
}

async function generatePrompt() {
  const tongue   = document.getElementById('tongue-select').value;
  const register = document.getElementById('register-select').value;
  const depth    = parseInt(document.getElementById('depth-slider').value);
  const area     = document.getElementById('prompt-area');

  area.innerHTML = '<p class="loading">Converging semantic field...</p>';

  const tongues = buildTongueList(tongue, depth, register);
  const temp    = [0.25, 0.55, 0.85][depth] ?? 0.55;
  const topN    = [3, 5, 8][depth] ?? 5;

  try {
    const resp = await fetch('/api/v1/intel/query/tongue', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ tongues, kernel: 'keshi', temp, window: 14, threshold: 12.0, max_iter: 48 })
    });
    if (!resp.ok) throw new Error(`status ${resp.status}`);
    const data = await resp.json();
    if (!data.candidates?.length) throw new Error('empty field');

    const active = data.candidates
      .map((c, j) => ({ ...c, act: data.state[data.active[j]] || 0 }))
      .sort((a, b) => b.act - a.act)
      .slice(0, topN);

    const akinenwun  = active.map(c => c.symbol).join('');
    const tongueLabel = tongues.join(' · ');
    const regLabel    = register === 'any' ? 'open' : register;
    const depthLabel  = DEPTH_LABELS[depth];

    const rows = active.map(c =>
      `<tr>
        <td class="field-symbol">${c.symbol}</td>
        <td class="field-meaning">${c.meaning}</td>
        <td class="field-tongue">${c.tongue}</td>
        <td class="field-bar">${activationBar(c.act)}</td>
      </tr>`
    ).join('');

    area.innerHTML = `
      <div class="prompt-card">
        <div class="prompt-meta">
          <span class="badge tongue">${tongueLabel}</span>
          <span class="badge register">${regLabel}</span>
          <span class="badge depth">${depthLabel}</span>
        </div>
        <p class="prompt-akinenwun">${akinenwun}</p>
        <table class="field-table">${rows}</table>
        <div class="prompt-actions">
          <button onclick="usePrompt(${JSON.stringify(akinenwun)})">Write from this field</button>
          <button onclick="generatePrompt()">Converge again ↗</button>
        </div>
      </div>`;
  } catch(e) {
    area.innerHTML = `<p class="error">The manifold was unreachable. Try again.</p>`;
  }
}

function usePrompt(text) {
  const ta = document.getElementById('composition-input');
  ta.placeholder = text;
  ta.focus();
}

function saveComposition() {
  const text = document.getElementById('composition-input').value.trim();
  if (!text) return;
  const tongue = document.getElementById('tongue-select').value;
  const register = document.getElementById('register-select').value;
  const entry = {
    text,
    tongue: tongue === 'any' ? 'open' : tongue,
    register: register === 'any' ? 'open' : register,
    timestamp: new Date().toISOString().slice(0,16).replace('T',' ')
  };
  corpus.unshift(entry);
  document.getElementById('composition-input').value = '';
  renderCorpus();
}

function renderCorpus() {
  const list = document.getElementById('corpus-list');
  document.getElementById('corpus-count').textContent = `${corpus.length} ${corpus.length === 1 ? 'entry' : 'entries'}`;
  if (!corpus.length) {
    list.innerHTML = '<p class="empty-state">No compositions saved yet.</p>';
    return;
  }
  list.innerHTML = corpus.map((e,i) => `
    <div class="corpus-entry">
      <div>${e.text}</div>
      <div class="corpus-meta">${e.tongue} · ${e.register} · ${e.timestamp}</div>
    </div>`).join('');
}

// ── TCE composition analysis ──────────────────────────────────────────────────

function tokenizeShygazun(text) {
  // Build symbol→{addr,tongue,meaning} map — full 1358-candidate table preferred
  const symMap = {};
  if (_fullCandidates) {
    for (const [addr, e] of Object.entries(_fullCandidates)) {
      symMap[e.sym.toLowerCase()] = { addr: parseInt(addr), sym: e.sym, tongue: e.tongue, meaning: e.meaning };
    }
  } else {
    for (const [addrStr, e] of Object.entries(BYTE_TABLE)) {
      symMap[e.s.toLowerCase()] = { addr: parseInt(addrStr), sym: e.s, tongue: e.t, meaning: e.m };
    }
  }
  // Sort longest-first for greedy match
  const syms = Object.keys(symMap).sort((a, b) => b.length - a.length);

  // Scan: try spaces-stripped and original
  const tokens = [];
  const lower = text.toLowerCase();
  let i = 0;
  while (i < lower.length) {
    if (/\s/.test(lower[i])) { i++; continue; }
    let matched = false;
    for (const sym of syms) {
      if (lower.startsWith(sym, i)) {
        tokens.push(symMap[sym]);
        i += sym.length;
        matched = true;
        break;
      }
    }
    if (!matched) i++;
  }
  return tokens;
}

async function analyzeComposition() {
  const text = document.getElementById('composition-input').value.trim();
  if (!text) return;

  const area = document.getElementById('prompt-area');
  area.innerHTML = '<p class="loading">Reading the manifold...</p>';

  const seeds = tokenizeShygazun(text);
  if (!seeds.length) {
    area.innerHTML = '<p class="error">No recognized Shygazun symbols found in the composition.</p>';
    return;
  }

  try {
    const resp = await fetch('/api/v1/intel/query/seed', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ addrs: seeds.map(s => s.addr), kernel: 'giann', temp: 0.0, max_iter: 48 })
    });
    if (!resp.ok) throw new Error(`status ${resp.status}`);
    const data = await resp.json();

    // Seed set for distinguishing seeds from activated adjacents
    const seedAddrs = new Set(seeds.map(s => s.addr));

    // Tongue distribution over activated field
    const tongueCounts = {};
    for (const c of data.candidates) {
      tongueCounts[c.tongue] = (tongueCounts[c.tongue] || 0) + 1;
    }
    const topTongues = Object.entries(tongueCounts)
      .sort((a, b) => b[1] - a[1]).slice(0, 6);
    const maxCount = topTongues[0]?.[1] || 1;

    const tongueRows = topTongues.map(([t, n]) => {
      const w = Math.round((n / maxCount) * 8);
      return `<tr><td class="field-tongue" style="width:120px">${t}</td><td class="field-bar">${'█'.repeat(w)}${'░'.repeat(8-w)}</td><td style="color:#7878a0;font-size:11px;padding-left:6px">${n}</td></tr>`;
    }).join('');

    // Adjacent candidates (activated but not seeded)
    const adjacent = data.candidates
      .filter(c => !seedAddrs.has(c.addr))
      .map((c, j) => ({ ...c, act: data.state[data.active[j]] || 0 }))
      .sort((a, b) => b.act - a.act).slice(0, 5);

    const adjRows = adjacent.map(c =>
      `<tr><td class="field-symbol">${c.symbol}</td><td class="field-meaning">${c.meaning}</td><td class="field-tongue">${c.tongue}</td></tr>`
    ).join('');

    const seedList = seeds.map(s => `<span class="badge tongue" style="font-family:monospace">${s.sym}</span>`).join(' ');

    area.innerHTML = `
      <div class="prompt-card">
        <div class="prompt-meta"><span class="badge depth">analysis · Giann</span></div>
        <p style="font-size:12px;color:#7878a0;margin-bottom:10px">seeds recognized</p>
        <p style="margin-bottom:14px">${seedList}</p>
        <p style="font-size:12px;color:#7878a0;margin-bottom:6px">tongue distribution</p>
        <table class="field-table" style="margin-bottom:14px">${tongueRows}</table>
        ${adjRows ? `<p style="font-size:12px;color:#7878a0;margin-bottom:6px">adjacent field</p>
        <table class="field-table">${adjRows}</table>` : ''}
        <p style="font-size:11px;color:#5040a0;margin-top:10px">energy ${data.energy.toFixed(3)} · ${data.iterations} iterations · ${data.candidates.length} candidates active</p>
      </div>`;
  } catch(e) {
    area.innerHTML = `<p class="error">The manifold was unreachable. Try again.</p>`;
  }
}
</script>

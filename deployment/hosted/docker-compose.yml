services:
  postgres:
    image: postgres:16
    container_name: kolabyrnth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-atelier}
      POSTGRES_USER: ${POSTGRES_USER:-atelier}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atelier}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atelier} -d ${POSTGRES_DB:-atelier}"]
      interval: 10s
      timeout: 5s
      retries: 10

  kernel:
    build:
      context: ../..
      dockerfile: deployment/hosted/kernel.Dockerfile
    container_name: kolabyrnth-kernel
    restart: unless-stopped
    ports:
      - "${KERNEL_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/events', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: deployment/hosted/api.Dockerfile
    container_name: kolabyrnth-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kernel:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-atelier}:${POSTGRES_PASSWORD:-atelier}@postgres:5432/${POSTGRES_DB:-atelier}
      KERNEL_BASE_URL: http://kernel:8000
      AUTH_MODE: ${AUTH_MODE:-mixed}
      AUTH_TOKEN_SECRET: ${AUTH_TOKEN_SECRET:-CHANGE_ME}
      ADMIN_GATE_CODE: ${ADMIN_GATE_CODE:-STEWARD_DEV_GATE}
      ADMIN_GATE_BYPASS: ${ADMIN_GATE_BYPASS:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173,http://localhost}
    ports:
      - "${API_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
